<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-agent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#grad-agent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Robot/AI head shape -->
    <rect x="25" y="20" width="70" height="55" rx="10" fill="url(#grad-agent)" opacity="0.2"/>
    <rect x="25" y="20" width="70" height="55" rx="10" stroke="url(#grad-agent)"/>
    <!-- Screen/face -->
    <rect x="35" y="30" width="50" height="30" rx="5" fill="#08080c" stroke="url(#grad-agent)" stroke-width="1"/>
    <!-- AI eyes -->
    <circle cx="48" cy="45" r="5" fill="url(#grad-agent)">
      <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="45" r="5" fill="url(#grad-agent)">
      <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Base/stand -->
    <rect x="45" y="75" width="30" height="8" rx="2" fill="url(#grad-agent)" opacity="0.6"/>
    <rect x="40" y="83" width="40" height="5" rx="2" fill="url(#grad-agent)" opacity="0.4"/>
    <!-- Antenna -->
    <line x1="60" y1="10" x2="60" y2="20"/>
    <circle cx="60" cy="10" r="3" fill="url(#grad-agent)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Signal waves -->
    <path d="M70 10 Q80 10 80 20" stroke-width="1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M75 8 Q88 8 88 25" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>