<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="analyticsGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <filter id="analyticsGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .bar { animation: grow-bar 2s ease-out infinite; transform-origin: bottom; }
      .bar-1 { animation-delay: 0s; }
      .bar-2 { animation-delay: 0.2s; }
      .bar-3 { animation-delay: 0.4s; }
      .trend-line { animation: draw-line 3s ease-in-out infinite; }
      .trend-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
      .particle { animation: float 4s ease-in-out infinite; }
      
      @keyframes grow-bar {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.05); }
      }
      @keyframes draw-line {
        0%, 100% { stroke-dashoffset: 0; }
        50% { stroke-dashoffset: 10; }
    }
      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.3); }
      }
      @keyframes float {
        0%, 100% { opacity: 0.3; transform: translate(0, 0); }
        50% { opacity: 0.6; transform: translate(3px, -3px); }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0f"/>
  
  <!-- Chart background -->
  <g opacity="0.1">
    <line x1="25" y1="170" x2="175" y2="170" stroke="#00d4aa" stroke-width="1"/>
    <line x1="25" y1="25" x2="25" y2="170" stroke="#00d4aa" stroke-width="1"/>
    
    <!-- Grid lines -->
    <line x1="25" y1="45" x2="175" y2="45" stroke="#00d4aa" stroke-width="0.5" stroke-dasharray="2,4"/>
    <line x1="25" y1="95" x2="175" y2="95" stroke="#00d4aa" stroke-width="0.5" stroke-dasharray="2,4"/>
    <line x1="25" y1="145" x2="175" y2="145" stroke="#00d4aa" stroke-width="0.5" stroke-dasharray="2,4"/>
  </g>
  
  <!-- Y-axis labels -->
  <text x="15" y="48" font-family="Inter, sans-serif" font-size="8" fill="#00d4aa" opacity="0.6">100</text>
  <text x="15" y="98" font-family="Inter, sans-serif" font-size="8" fill="#00d4aa" opacity="0.6">50</text>
  <text x="15" y="175" font-family="Inter, sans-serif" font-size="8" fill="#00d4aa" opacity="0.6">0</text>
  
  <!-- Bars -->
  <g class="bar bar-1">
    <rect x="45" y="110" width="30" height="60" rx="3" fill="url(#barGrad1)" filter="url(#analyticsGlow)">
      <animate attributeName="height" values="60;65;60" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="110;105;110" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="113" width="24" height="54" rx="2" fill="#1a1a2e" opacity="0.3"/>
  </g>
  
  <g class="bar bar-2">
    <rect x="85" y="75" width="30" height="95" rx="3" fill="url(#barGrad2)" filter="url(#analyticsGlow)">
      <animate attributeName="height" values="95;100;95" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="75;70;75" dur="2.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="88" y="78" width="24" height="89" rx="2" fill="#1a1a2e" opacity="0.3"/>
  </g>
  
  <g class="bar bar-3">
    <rect x="125" y="45" width="30" height="125" rx="3" fill="url(#barGrad3)" filter="url(#analyticsGlow)">
      <animate attributeName="height" values="125;130;125" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="45;40;45" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="128" y="48" width="24" height="119" rx="2" fill="#1a1a2e" opacity="0.3"/>
  </g>
  
  <!-- Trend line -->
  <g class="trend-line">
    <path d="M 60 105 L 100 70 L 140 40" stroke="url(#trendGrad)" stroke-width="3" fill="none" 
          stroke-linecap="round" filter="url(#analyticsGlow)"
          stroke-dasharray="100" stroke-dashoffset="0"/>
  </g>
  
  <!-- Trend dots -->
  <g class="trend-dot" style="animation-delay: 0s;">
    <circle cx="60" cy="105" r="6" fill="#3b82f6">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="105" r="3" fill="#60a5fa"/>
  </g>
  
  <g class="trend-dot" style="animation-delay: 0.3s;">
    <circle cx="100" cy="70" r="6" fill="#6366f1">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="70" r="3" fill="#a78bfa"/>
  </g>
  
  <g class="trend-dot" style="animation-delay: 0.6s;">
    <circle cx="140" cy="40" r="6" fill="#7c3aed">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="40" r="3" fill="#a855f7"/>
  </g>
  
  <!-- Arrow indicator -->
  <g filter="url(#analyticsGlow)">
    <path d="M 150 25 L 165 10 L 165 18" stroke="url(#trendGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 165 10 L 165 18 L 157 16" fill="#f59e0b"/>
    <circle cx="165" cy="10" r="3" fill="#f59e0b">
      <animate attributeName="r" values="3;4;3" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating particles -->
  <g class="particle" style="animation-delay: 0s;">
    <circle cx="20" cy="190" r="2" fill="#00d4aa" opacity="0.4"/>
  </g>
  <g class="particle" style="animation-delay: 1s;">
    <circle cx="40" cy="30" r="2" fill="#3b82f6" opacity="0.4"/>
  </g>
  <g class="particle" style="animation-delay: 2s;">
    <circle cx="180" cy="180" r="2" fill="#7c3aed" opacity="0.4"/>
  </g>
  <g class="particle" style="animation-delay: 3s;">
    <circle cx="190" cy="60" r="2" fill="#00d4aa" opacity="0.4"/>
  </g>
  
  <!-- Corner accents -->
  <circle cx="20" cy="20" r="5" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <circle cx="180" cy="20" r="5" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <circle cx="20" cy="180" r="5" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
</svg>