<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="consultingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="consultingGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0.6"/>
    </linearGradient>
    
    <filter id="glowConsulting">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .layer-1 { animation: float1 4s ease-in-out infinite; }
      .layer-2 { animation: float2 5s ease-in-out infinite; }
      .layer-3 { animation: float3 6s ease-in-out infinite; }
      .connection { animation: pulse-connection 2s ease-in-out infinite; }
      
      @keyframes float1 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes float3 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      @keyframes pulse-connection {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0f"/>
  
  <!-- Layer 1 (bottom) -->
  <g class="layer-1">
    <polygon points="100,160 30,120 100,80" fill="url(#consultingGrad)" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="100,160 170,120 100,80" fill="url(#consultingGrad2)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Layer 2 (middle) -->
  <g class="layer-2" filter="url(#glowConsulting)">
    <polygon points="100,130 50,100 100,70" fill="url(#consultingGrad)" opacity="0.6"/>
    <polygon points="100,130 150,100 100,70" fill="url(#consultingGrad2)" opacity="0.5"/>
    <line x1="50" y1="100" x2="150" y2="100" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Layer 3 (top) -->
  <g class="layer-3" filter="url(#glowConsulting)">
    <polygon points="100,100 65,80 100,60" fill="url(#consultingGrad)" opacity="0.9"/>
    <polygon points="100,100 135,80 100,60" fill="url(#consultingGrad)" opacity="0.7"/>
    <line x1="65" y1="80" x2="135" y2="80" stroke="#00d4aa" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Top node -->
  <g class="layer-3">
    <circle cx="100" cy="60" r="12" fill="#0a0a0f"/>
    <circle cx="100" cy="60" r="10" fill="none" stroke="url(#consultingGrad)" stroke-width="2">
      <animate attributeName="r" values="10;12;10" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="60" r="4" fill="url(#consultingGrad)">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection lines -->
  <g class="connection">
    <line x1="100" y1="72" x2="100" y2="95" stroke="url(#consultingGrad)" stroke-width="2"/>
  </g>
  
  <!-- Corner nodes -->
  <g class="layer-1">
    <circle cx="50" cy="100" r="6" fill="url(#consultingGrad)">
      <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="100" r="6" fill="url(#consultingGrad)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Base nodes -->
  <g class="layer-1">
    <circle cx="30" cy="120" r="5" fill="#3b82f6" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="120" r="5" fill="#7c3aed" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>
  
  <!-- Floating particles -->
  <circle cx="25" cy="50" r="2" fill="#00d4aa" opacity="0.5">
    <animate attributeName="cy" values="50;45;50" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="175" cy="55" r="2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cy" values="55;50;55" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="180" r="2" fill="#7c3aed" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>