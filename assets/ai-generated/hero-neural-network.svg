<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#08080c"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Styles -->
    <style>
      .node { filter: url(#glow); }
      .node-center { animation: pulse 3s ease-in-out infinite; }
      .node-outer { animation: float 6s ease-in-out infinite; }
      .connection { animation: pulse-line 2s ease-in-out infinite; }
      .particle { animation: drift 8s ease-in-out infinite; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        33% { transform: translate(5px, -5px); }
        66% { transform: translate(-3px, 3px); }
      }
      @keyframes pulse-line {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        50% { transform: translate(10px, -10px); opacity: 0.8; }
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .rotating { animation: rotate 20s linear infinite; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00d4aa" stroke-width="0.5"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </g>
  
  <!-- Outer rotating ring -->
  <g class="rotating">
    <circle cx="300" cy="250" r="200" fill="none" stroke="url(#centerGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="5,10"/>
  </g>
  <g class="rotating" style="animation-direction: reverse;">
    <circle cx="300" cy="250" r="180" fill="none" stroke="url(#nodeGrad2)" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,15"/>
  </g>
  
  <!-- Central AI Core -->
  <g transform="translate(300, 250)">
    <!-- Core glow -->
    <circle r="60" fill="url(#centerGrad)" opacity="0.15">
      <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Core node -->
    <circle class="node node-center" r="45" fill="url(#centerGrad)"/>
    <circle r="35" fill="#0a0a0f"/>
    
    <!-- AI Text -->
    <text x="0" y="8" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="22" font-weight="700" fill="url(#centerGrad)">AI</text>
    
    <!-- Inner ring -->
    <circle r="50" fill="none" stroke="url(#centerGrad)" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="50;55;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Outer Nodes -->
  <g class="node node-outer">
    <!-- Top node -->
    <circle cx="300" cy="70" r="25" fill="url(#nodeGrad1)"/>
    <circle cx="300" cy="70" r="15" fill="#0a0a0f"/>
    <text x="300" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00d4aa">ML</text>
  </g>
  
  <g class="node node-outer" style="animation-delay: -2s;">
    <!-- Right node -->
    <circle cx="520" cy="190" r="25" fill="url(#nodeGrad2)"/>
    <circle cx="520" cy="190" r="15" fill="#0a0a0f"/>
    <text x="520" y="195" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">NLP</text>
  </g>
  
  <g class="node node-outer" style="animation-delay: -4s;">
    <!-- Right-bottom node -->
    <circle cx="460" cy="400" r="25" fill="url(#nodeGrad3)"/>
    <circle cx="460" cy="400" r="15" fill="#0a0a0f"/>
    <text x="460" y="405" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">DATA</text>
  </g>
  
  <g class="node node-outer" style="animation-delay: -1s;">
    <!-- Left-bottom node -->
    <circle cx="140" cy="400" r="25" fill="url(#nodeGrad1)"/>
    <circle cx="140" cy="400" r="15" fill="#0a0a0f"/>
    <text x="140" y="405" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00d4aa">VISION</text>
  </g>
  
  <g class="node node-outer" style="animation-delay: -3s;">
    <!-- Left node -->
    <circle cx="80" cy="190" r="25" fill="url(#nodeGrad2)"/>
    <circle cx="80" cy="190" r="15" fill="#0a0a0f"/>
    <text x="80" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6">AUTO</text>
  </g>
  
  <!-- Connection Lines -->
  <g class="connection" style="animation-delay: 0s;">
    <line x1="300" y1="115" x2="300" y2="205" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  <g class="connection" style="animation-delay: 0.5s;">
    <line x1="345" y1="250" x2="495" y2="190" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  <g class="connection" style="animation-delay: 1s;">
    <line x1="340" y1="290" x2="435" y2="375" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  <g class="connection" style="animation-delay: 1.5s;">
    <line x1="260" y1="290" x2="165" y2="375" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  <g class="connection" style="animation-delay: 2s;">
    <line x1="255" y1="250" x2="105" y2="190" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  
  <!-- Floating particles -->
  <g class="particle" style="animation-delay: 0s;">
    <circle cx="50" cy="80" r="3" fill="#00d4aa"/>
  </g>
  <g class="particle" style="animation-delay: 2s;">
    <circle cx="550" cy="100" r="4" fill="#3b82f6"/>
  </g>
  <g class="particle" style="animation-delay: 4s;">
    <circle cx="570" cy="420" r="3" fill="#7c3aed"/>
  </g>
  <g class="particle" style="animation-delay: 1s;">
    <circle cx="30" cy="320" r="3" fill="#00d4aa"/>
  </g>
  <g class="particle" style="animation-delay: 3s;">
    <circle cx="200" cy="50" r="2" fill="#3b82f6"/>
  </g>
  <g class="particle" style="animation-delay: 5s;">
    <circle cx="420" cy="60" r="2" fill="#7c3aed"/>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="180" cy="140" r="8" fill="none" stroke="#00d4aa" stroke-width="1">
      <animate attributeName="r" values="8;12;8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="140" r="8" fill="none" stroke="#7c3aed" stroke-width="1">
      <animate attributeName="r" values="8;12;8" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>